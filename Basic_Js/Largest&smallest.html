<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finding smallest and largest number</title>
</head>
<body>
    <h2>Find smallest and largest number</h2>

    <input type="number" id="num1" placeholder="Input First number">
    <input type="number" id="num2" placeholder="Input Second number">
    <input type="number" id="num3" placeholder="Input Third number">
    <br><br>

    <button onclick="findNumbers()">Check</button>

    <p id="result"></p>

    <script>
        function findNumbers() {
            // Get values from inputs
            let n1 = parseFloat(document.getElementById("num1").value);
            let n2 = parseFloat(document.getElementById("num2").value);
            let n3 = parseFloat(document.getElementById("num3").value);

            // Check if all inputs are filled
            if (isNaN(n1) || isNaN(n2) || isNaN(n3)) {
                document.getElementById("result").innerHTML = "Please enter all three numbers.";
                return;
            }

            // Find smallest and largest
            let smallest = Math.min(n1, n2, n3);
            let largest  = Math.max(n1, n2, n3);

            // Show result
            document.getElementById("result").innerHTML = 
                "Smallest: " + smallest + "<br>Largest: " + largest;
        }
    </script>
</body>
</html>
